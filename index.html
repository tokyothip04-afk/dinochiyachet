<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UWU RUNNNN </title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root { 
      --w: 900px; 
      --h: 440px; 
      --h-m: 380px; /* ปรับให้เตี้ยลงเล็กน้อยบนมือถือ */
      --pink: #140b89; 
      --white: #ffffff; 
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.18'%3E%3Ccircle cx='30' cy='20' r='4'/%3E%3Ccircle cx='20' cy='30' r='4'/%3E%3Ccircle cx='40' cy='30' r='4'/%3E%3Ccircle cx='30' cy='40' r='4'/%3E%3Ccircle cx='30' cy='30' r='3'/%3E%3C/g%3E%3C/svg%3E"),
        var(--pink);
      background-size: 70px 70px;
      color: #111;
      font-family: "IBM Plex Sans Thai", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .wrap { 
      margin-top: 0px; 
      width: min(var(--w), 94vw); 
    }

    .game-logo {
      text-align: center;
      margin-bottom: 12px;
    }

    .game-logo img {
      width: 400px;
      max-width: 90%;
    }

    .hud {
      color: var(--white);
      font-weight: 500;
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      margin: 0 0 8px 0; 
      font-size: 16px;
    }

    .score { font-weight: 600; font-size: 18px; }
    .topscore { font-weight: 600; font-size: 22px; }

    .game {
      position: relative;
      width: 100%;
      height: var(--h);
      background: linear-gradient(to bottom, #ffffff 0%, #ffffff 60%, #b4f4ff 60%, #cdf7ff 100%);
      border: 2px solid #111;
      border-radius: 12px;
      overflow: hidden;
      user-select: none;
      touch-action: none;
      overscroll-behavior: contain;    
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 45px;
      background:
        radial-gradient(circle at 3px 3px, #e9c97a 1px, transparent 1px),
        radial-gradient(circle at 7px 7px, #d6ad5c 1px, transparent 1px),
        #f3ba60;
      background-size: 12px 12px;
    }

    .hint {
      width: 100%;
      position: absolute;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 800;
      font-size: 36px;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .dino {
      position: absolute;
      height: 150px;
      aspect-ratio: 231 / 250;
      bottom: 14px;
      background-image: url("Ched.webp");
      background-size: contain;
      background-repeat: no-repeat;
    }

    .dinoHitbox {
      position: absolute;
      width: 60%;
      height: 90%;
      left: 10%;
      bottom: 7%;
    }

    .dino.running { animation: bob 260ms linear infinite; }
    
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    .charRight {
      position: absolute;
      right: 0px;
      bottom: -25px;
      height: 280px;
      width: auto;
      transition: right 600ms ease-in;
      pointer-events: none;
      z-index: 10;
    }
    
    .charRight.struggle { animation: struggle 0ms ease-in-out infinite; }
    .charRight.runAway { right: -200px; }
    
    @keyframes struggle {
      0%   { transform: scaleX(-1) rotate(0deg) translateY(0); }
      25%  { transform: scaleX(-1) rotate(-16deg) translateY(1px); }
      50%  { transform: scaleX(-1) rotate(4deg) translateY(0); }
      75%  { transform: scaleX(-1) rotate(-16deg) translateY(1px); }
      100% { transform: scaleX(-1) rotate(0deg) translateY(0); }
    }

    .obstacle {
      position: absolute;
      bottom: 14px;
      width: 22px; 
      height: 46px;
      background: transparent;
      border-radius: 6px;
      will-change: transform, left;
    }

    @keyframes drunkFallRight {
      0%   { transform: rotate(0deg) translateX(0) translateY(0); }
      40%  { transform: rotate(16deg) translateX(0) translateY(0); }
      72%  { transform: rotate(90deg) translateX(-30px) translateY(0); }
      86%  { transform: rotate(90deg) translateX(-26px) translateY(2px); }
      100% { transform: rotate(90deg) translateX(-30px) translateY(0); }
    }

    .obstacle.drunkFallRight {
      transform-origin: bottom center;
      animation: drunkFallRight 420ms cubic-bezier(.2,.9,.2,1) forwards;
    }

    .cloud {
      position: absolute;
      top: 40px;
      height: 100px;
      width: auto;
      pointer-events: none;
      opacity: 0.1;
      left: 0; /* base left, moved by transform */
      will-change: transform;
    }

    .scenery {
      position: absolute;
      bottom: 40px;
      left: 0; /* base left, moved by transform */
      transform-origin: center bottom;
      pointer-events: none;
      z-index: 1;
      opacity: 0.15;
      will-change: transform;
    }

    .overlay {
      z-index: 9;
      position: absolute; 
      inset: 0;
      display: grid; 
      place-items: center;
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(2px);
      text-align: center;
      padding: 16px;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s, opacity 0.3s linear;
    }
    
    .overlay.show { 
      visibility: visible; 
      opacity: 1;
    }

    .overlay h2 { margin: 0 0 8px 0; }
    .overlay p { margin: 0 0 12px 0; opacity: .85; }

    .hitboxDebug {
      position: fixed;
      border: 2px solid red;
      background: rgba(255,0,0,0.15);
      pointer-events: none;
      z-index: 9999;
    }

    .scoreModal {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0,0,0,.25);
      z-index: 50; /* ตอนนี้ z-index ทำงานได้ถูกต้องแล้ว */
    }

    .scoreModal.show { display: grid; }

    .scoreModal .modalCard {
      width: min(520px, calc(100vw - 32px));
      background: #fff;
      border: 2px solid #111;
      border-radius: 18px;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-sizing: border-box;
    }

    #scoreModal input {
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
      font-family: "IBM Plex Sans Thai", system-ui, sans-serif;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid #111;
      margin: 18px 0;
      outline: none;
    }

    #scoreModal input:focus {
      border-color: #111;
      box-shadow: 0 0 0 4px rgba(219,105,111,.25);
    }

    #scoreModal .btnRow {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    #scoreModal .btnPrimary,
    #scoreModal .btnSecondary {
      min-width: 140px;
      font-family: "IBM Plex Sans Thai", system-ui, sans-serif;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all .15s ease;
    }

    .btnPrimary {
      background: #db696f;
      color: #fff;
      border: none;
    }

    .btnPrimary:hover { filter: brightness(1.05); }
    .btnPrimary:active { transform: scale(.97); }

    .btnSecondary {
      background: #ececec;
      color: #111;
      border: 2px solid #d0d0d0;
      font-weight: 600;
    }

    .btnSecondary:hover { background: #e2e2e2; }
    .btnSecondary:active { transform: scale(.97); }

    #rankMsg { margin-top: 16px; }

    /* Responsive ปรับสำหรับมือถือ */
    @media (max-width: 520px) {
      .wrap { margin-top: 20px; }
      .game { height: var(--h-m); }
      .charRight {
        right: -20px;
        height: 180px;
      }
      #scoreModal .btnRow {
        flex-direction: column; /* ให้ปุ่มเรียงแนวตั้งบนจอมือถือ */
        gap: 10px;
      }
      #scoreModal .btnPrimary,
      #scoreModal .btnSecondary {
        width: 100%; /* ปุ่มยืดเต็มความกว้าง */
        min-width: unset;
      }
    }
  </style>
  <script src="script.js" defer></script>
</head>
<body>

  <div class="wrap">
    
    <div class="game-logo">
      <img src="head.webp" alt="Game Logo">
    </div>

    <div class="hud">
      <div>Space = กระโดด</div>
      <div style="line-height:1.2">คะแนน: <span class="score" id="score">0</span> | สูงสุด: <span class="topscore" id="best">0</span></div>
    </div>

    <div class="game" id="game" aria-label="Dino runner game" role="application">
      <div class="hint">แตะจอเพื่อเริ่มเล่น</div>
      <img class="cloud" id="cloud" alt="">
      <div class="ground"></div>
      <div class="dino" id="dino"><div class="dinoHitbox"></div></div>

      <div class="overlay" id="overlay">
        <div>
          <h2 id="title">Noooooooooooooooo</h2>
          <p id="subtitle">แตะเพื่อเริ่มใหม่</p>
        </div>
      </div>

      <div id="scoreModal" class="scoreModal" aria-hidden="true">
        <div class="modalCard" onclick="event.stopPropagation()">
          <h2>ส่งคะแนนเข้าตาราง</h2>
          <div class="sub">ใส่ชื่อ (ไม่เกิน 30 ตัวอักษร)</div>
          <input id="playerName" maxlength="30" placeholder="ชื่อของคุณ" />
          <div class="btnRow">
            <button id="sendScoreBtn" class="btnPrimary" type="button">ส่งคะแนน</button>
            <button id="closeModalBtn" class="btnSecondary" type="button">ยกเลิก</button>
          </div>
          <div id="rankMsg"></div>
        </div>
      </div>

      <img id="charRight" class="charRight struggle" src="chet2.webp" alt="" aria-hidden="true">
    </div>

  </div>
</body>
</html>
